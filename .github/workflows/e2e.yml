name: E2E

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  schedule:
    # Weekly Monday 06:00 UTC — catches cookie expiry early so you can refresh the secret.
    - cron: "0 6 * * 1"

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Sanity-check secret is set
        env:
          YT_COOKIES_JSON: ${{ secrets.YT_COOKIES_JSON }}
        run: |
          if [ -z "$YT_COOKIES_JSON" ]; then
            echo "::error::YT_COOKIES_JSON repo secret is empty. Record via test/record-cookies.sh and run 'gh secret set YT_COOKIES_JSON < cookies.json'."
            exit 1
          fi

      - name: Run E2E
        env:
          YT_COOKIES_JSON: ${{ secrets.YT_COOKIES_JSON }}
        working-directory: test
        run: docker compose up --build --abort-on-container-exit --exit-code-from e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: test/playwright-report
          retention-days: 14
